# ── Correctness: potential bugs ─────────────────────────────────────────────
potential-bugs:
  active: true
  CastToNullableType:
    active: true
  Deprecation:
    active: false          # already handled via @Suppress("DEPRECATION") with version guards
  DoubleMutabilityForCollection:
    active: true
  ElseCaseInsteadOfExhaustiveWhen:
    active: true
  EqualsAlwaysReturnsTrueOrFalse:
    active: true
  ExitOutsideMain:
    active: true
  HasPlatformType:
    active: true           # catches implicit platform types leaking from Java APIs
  IgnoredReturnValue:
    active: false          # too noisy with builder/dsl patterns
  ImplicitDefaultLocale:
    active: true           # catches String.format() without explicit Locale
  InvalidRange:
    active: true
  IteratorNotThrowingNoSuchElementException:
    active: true
  MapGetWithNotNullAssertionOperator:
    active: true
  MissingPackageDeclaration:
    active: true
  NullCheckOnMutableProperty:
    active: true
  NullableToStringCall:
    active: true
  UnconditionalJumpStatementInLoop:
    active: true
  UnnecessaryNotNullCheck:
    active: true
  UnnecessaryNotNullOperator:
    active: true           # catches !! — project rule: no !! operator
  UnreachableCode:
    active: true
  UnsafeCallOnNullableType:
    active: true           # catches !! — same as above, belt-and-suspenders
  UselessPostfixExpression:
    active: true

# ── Empty blocks ───────────────────────────────────────────────────────────
empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  EmptyDefaultConstructor:
    active: true
  EmptyElseBlock:
    active: true
  EmptyFinallyBlock:
    active: true
  EmptyForBlock:
    active: true
  EmptyFunctionBlock:
    active: true
    ignoreOverridden: true
  EmptyIfBlock:
    active: true
  EmptyInitBlock:
    active: true
  EmptySecondaryConstructor:
    active: true
  EmptyTryBlock:
    active: true
  EmptyWhenBlock:
    active: true
  EmptyWhileBlock:
    active: true

# ── Coroutines ─────────────────────────────────────────────────────────────
coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true           # catches GlobalScope launch — prefer viewModelScope / lifecycle
  InjectDispatcher:
    active: false          # would require large refactor; not worth the churn now
  RedundantSuspendModifier:
    active: true
  SleepInsteadOfDelay:
    active: true           # catches Thread.sleep() inside coroutines
  SuspendFunSwallowedCancellation:
    active: true           # catches missing CancellationException rethrow
  SuspendFunWithCoroutineScopeReceiver:
    active: true
  SuspendFunWithFlowReturnType:
    active: true

# ── Complexity ─────────────────────────────────────────────────────────────
complexity:
  CyclomaticComplexMethod:
    allowedComplexity: 20
  LongMethod:
    allowedLines: 80
  LongParameterList:
    allowedFunctionParameters: 10
    allowedConstructorParameters: 10
    ignoreDefaultParameters: true
  TooManyFunctions:
    allowedFunctionsPerFile: 25
    allowedFunctionsPerClass: 20
    allowedFunctionsPerInterface: 15
  NestedBlockDepth:
    allowedDepth: 5

# ── Naming ─────────────────────────────────────────────────────────────────
naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][A-Za-z0-9]*'

# ── Style ──────────────────────────────────────────────────────────────────
style:
  MagicNumber:
    active: false          # too noisy for UI code with dp/sp/color values
  ForbiddenComment:
    active: false
  ReturnCount:
    max: 4
  MaxLineLength:
    maxLineLength: 120
    excludeCommentStatements: true
  DestructuringDeclarationWithTooManyEntries:
    active: true
    maxDestructuringEntries: 5
  UnnecessaryAbstractClass:
    active: true
  UnnecessaryInheritance:
    active: true
  UnnecessaryLet:
    active: true
  UnusedImports:
    active: true
  UnusedParameter:
    active: true
    allowedNames: '_.*'
  UnusedPrivateMember:
    active: true
    allowedNames: '_.*|Companion'
  UseCheckOrError:
    active: true
  UseRequire:
    active: true

# ── Compose (io.nlopez.compose.rules) ──────────────────────────────────────
Compose:
  ComposableAnnotationNaming:
    active: false          # project uses standard naming already
  CompositionLocalAllowlist:
    active: false          # no allowlist needed for this project size
  ContentEmitterReturningValues:
    active: true
  DefaultsVisibility:
    active: true
  ModifierClickableOrder:
    active: true           # clickable must come after size/padding modifiers
  ModifierComposable:
    active: true
  ModifierMissing:
    active: true           # composables emitting UI must accept Modifier parameter
    checkModifiersForVisibility: public
  ModifierNaming:
    active: true
  ModifierNotUsedAtRoot:
    active: true           # passed Modifier must be used on root element
  ModifierWithoutDefault:
    active: true           # Modifier params must default to Modifier
  MultipleEmitters:
    active: true           # catches composables that emit multiple root elements
  MutableParameters:
    active: true           # catches mutable collections as composable params
  MutableStateAutoboxing:
    active: true           # catches autoboxing in mutableStateOf for primitives
  MutableStateParam:
    active: true           # State<T> should not be passed as parameter
  ParameterOrder:
    active: true           # Modifier should be last non-default parameter
  PreviewAnnotationNaming:
    active: false          # no custom preview annotations
  PreviewPublic:
    active: true           # @Preview composables should be private
  RememberMissing:
    active: true           # catches expensive objects not wrapped in remember {}
  RememberContentMissing:
    active: true
  UnstableCollections:
    active: false          # too noisy — requires @Immutable wrappers for List/Set/Map
  ViewModelForwarding:
    active: true           # ViewModel should not be forwarded to other composables
  ViewModelInjection:
    active: true           # viewModel() should only be called in top-level composables

# ── Exceptions ─────────────────────────────────────────────────────────────
exceptions:
  TooGenericExceptionCaught:
    allowedExceptionNameRegex: '_|(ignore|expected).*'
