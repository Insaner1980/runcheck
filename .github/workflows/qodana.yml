name: Qodana Main

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  qodana:
    name: Qodana Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Qodana Scan
        uses: JetBrains/qodana-action@107939d10e5ddbffb88bc5dd279934314937ed7a # v2026.1.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
