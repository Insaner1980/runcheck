name: Qodana

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  checks: write

jobs:
  qodana:
    name: Qodana Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.1
        with:
          linter: jetbrains/qodana-android:2025.1
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
