name: Qodana Code Quality
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches: # Specify your branches here
      - main # The 'main' branch
      - 'releases/*' # The release branches

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0  # Qodana uses full history for branch analysis
          persist-credentials: false
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@4861e015da555e86a72b862892aba6c2b93e6891 # v2026.1.3
        with:
          pr-mode: false
          primary-cache-key: qodana-code-quality-2026.1-${{ github.ref }}-${{ github.sha }}
          additional-cache-key: qodana-code-quality-2026.1-${{ github.ref }}
