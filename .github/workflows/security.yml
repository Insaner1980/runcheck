name: Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    container:
      image: semgrep/semgrep:1.162.0@sha256:9349edbadf90c3f3c0c3f55867625354e89680e6fa10d9034042af52fdb0e0d0
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - run: >
          semgrep scan
          --error
          --metrics=off
          --quiet
          --config config/semgrep/runcheck-security.yml
          --exclude app/build
          --exclude build
          --exclude reports
          --disable-version-check
          --sarif
          --output semgrep.sarif
          .
      - uses: github/codeql-action/upload-sarif@1a818fd5f97ed0ee9a823421bd5b171add01227f # v4.36.2
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: OWASP Dependency-Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Set Dependency-Check cache week
        id: dependency-check-cache
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-data-${{ steps.dependency-check-cache.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-data-

      - name: OWASP Dependency-Check
        continue-on-error: true
        timeout-minutes: 35
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon --no-configuration-cache --console=plain
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          DEPENDENCY_CHECK_AUTO_UPDATE: 'true'
          DEPENDENCY_CHECK_DATA_DIRECTORY: ${{ github.workspace }}/.gradle/dependency-check-data
          NVD_API_MAX_RETRY_COUNT: '5'
          NVD_VALID_FOR_HOURS: '168'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('reports/dependency-check-report.*') != ''
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check-report.*
          if-no-files-found: ignore
