name: Security Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
      - name: Install Semgrep
        run: python -m pip install --disable-pip-version-check semgrep==1.167.0
      - run: >
          semgrep scan
          --error
          --metrics=off
          --quiet
          --config config/semgrep/runcheck-security.yml
          --exclude app/build
          --exclude build
          --exclude reports
          --disable-version-check
          --sarif
          --output semgrep.sarif
          .
      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-check:
    name: OWASP Dependency-Check
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Set Dependency-Check cache week
        id: dependency-check-cache
        run: echo "week=$(date -u +'%G-W%V')" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .gradle/dependency-check-data
          key: ${{ runner.os }}-dependency-check-data-${{ steps.dependency-check-cache.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dependency-check-data-

      - name: OWASP Dependency-Check
        continue-on-error: true
        timeout-minutes: 35
        run: ./gradlew :app:dependencyCheckAnalyze --no-daemon --no-configuration-cache --console=plain
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
          DEPENDENCY_CHECK_AUTO_UPDATE: 'true'
          DEPENDENCY_CHECK_DATA_DIRECTORY: ${{ github.workspace }}/.gradle/dependency-check-data
          NVD_API_MAX_RETRY_COUNT: '5'
          NVD_VALID_FOR_HOURS: '168'

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always() && hashFiles('reports/dependency-check-report.*') != ''
        with:
          name: owasp-dependency-check-report
          path: reports/dependency-check-report.*
          if-no-files-found: ignore
