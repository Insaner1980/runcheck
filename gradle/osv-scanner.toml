version = "1.3.16"
ecosystem = "Maven"
vulnerability.ignore = true
effectiveUntil = 2026-10-02
reason = "Stale Gradle verification metadata only; debug/release runtime and root buildscript classpaths did not contain this package on 2026-07-02."

