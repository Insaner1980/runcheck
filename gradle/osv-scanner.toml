# Project-wide package ignores are intentionally avoided here.
# OSV scans supported lockfiles such as gradle/verification-metadata.xml; add
# package-specific [[PackageOverrides]] or [[IgnoredVulns]] entries only for
# verified false positives.

[[PackageOverrides]]
name = "com.fasterxml.jackson.core:jackson-databind"
version = "2.21.3"
ecosystem = "Maven"
vulnerability.ignore = true
reason = "Build-tool-only OWASP Dependency-Check dependency from Gradle verification metadata; debug/release runtime classpaths did not contain jackson-databind."

