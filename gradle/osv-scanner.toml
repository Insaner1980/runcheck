# OSV treats Gradle dependency-verification metadata as a supported Maven lockfile.
# This file stores reviewed, temporary exceptions for stale verification-metadata
# entries that are not present on the current app runtime classpaths. Keep each
# package override exact and expiring; do not add ecosystem-wide ignores.

[[IgnoredVulns]]
id = "GHSA-5jmj-h7xm-6q6v"
ignoreUntil = 2026-10-02
reason = "Jackson databind 2.22.0 is the latest Maven Central 2.x release as of 2026-07-02 and OSV still reports this advisory; current exposure is Gradle build tooling only, not app runtime. Recheck when a fixed 2.x release is available."

