<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <!--
    Android Adaptive Icon Foreground Layer
    Canvas: 108dp
    Safe zone: 72dp centered (18dp inset on each side)
    Content centered in safe zone
  -->

  <!-- Health score arc -->
  <circle
    cx="54" cy="54" r="28"
    fill="none"
    stroke="#4A9EDE"
    stroke-width="4"
    stroke-dasharray="103 176"
    stroke-linecap="round"
    transform="rotate(135 54 54)"
  />

  <!-- Phone body -->
  <rect
    x="44.5" y="41"
    width="19" height="26"
    rx="3.5" ry="3.5"
    fill="none"
    stroke="#4A9EDE"
    stroke-width="3"
  />

  <!-- Phone screen -->
  <rect
    x="47" y="44"
    width="14" height="20"
    rx="1.5" ry="1.5"
    fill="#4A9EDE"
    opacity="0.28"
  />
</svg>
