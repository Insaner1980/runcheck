<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="432" height="432">
  <!--
    Android Adaptive Icon Monochrome Layer (Material You)
    Uses black silhouette - Android applies theme color tinting
  -->

  <!-- Health score arc -->
  <circle
    cx="54" cy="54" r="28"
    fill="none"
    stroke="#000000"
    stroke-width="4"
    stroke-dasharray="103 176"
    stroke-linecap="round"
    transform="rotate(135 54 54)"
  />

  <!-- Phone body -->
  <rect
    x="44.5" y="41"
    width="19" height="26"
    rx="3.5" ry="3.5"
    fill="none"
    stroke="#000000"
    stroke-width="2"
  />

  <!-- Phone screen -->
  <rect
    x="46.5" y="43.5"
    width="15" height="21"
    rx="2" ry="2"
    fill="#000000"
    opacity="0.18"
  />
</svg>